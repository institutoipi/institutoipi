# Postgres do institutoipi via CNPG. Dados migrados do Docker (david) via pg_dump/restore.
# Secret ipi-db-app (key `uri`) — usado como DATABASE_URL no Deployment.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ipi-db
  namespace: institutoipi
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  storage:
    size: 2Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: institutoipi
      owner: institutoipi
