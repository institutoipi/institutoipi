# Sobe só a infra local (Postgres + MinIO + Mailpit). O app roda no host com
# `npm run dev` (ver README) — mais rápido pra desenvolver e depurar.
services:
  institutoipi.postgres:
    container_name: institutoipi.postgres
    restart: always
    image: postgres:latest
    environment:
      POSTGRES_USER: institutoipi
      POSTGRES_PASSWORD: institutoipi
      POSTGRES_DB: institutoipi
    volumes:
     - ipi_pgdata:/var/lib/postgresql
    ports:
     - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U institutoipi -d institutoipi" ]
      interval: 5s
      timeout: 5s
      retries: 10

  institutoipi.minio:
    env_file:
      - .env
    image: minio/minio
    container_name: institutoipi.minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ipi_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  institutoipi.minio-init:
    image: minio/mc
    container_name: institutoipi.minio-init
    restart: "no"
    depends_on:
      institutoipi.minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://institutoipi.minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$MINIO_BUCKET &&
      mc anonymous set download local/$$MINIO_BUCKET &&
      echo 'MinIO pronto'
      "

  institutoipi.mailpit:
    image: axllent/mailpit
    container_name: institutoipi.mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_UI_PORT}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  ipi_pgdata:
  ipi_minio_data:
