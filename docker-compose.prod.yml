# =============================================================
# Instituto IPI — produção (oracle-david)
#
# Local no servidor: /opt/institutoipi/docker-compose.yml (+ .env via Infisical)
# Pré-requisitos no servidor:
#   - Traefik standalone (rede traefik-public)
#   - MinIO do servidor (bucket institutoipi-media + usuário ipi criados no console)
#
# Deploy (feito pelo GitHub Actions):
#   docker compose pull app && docker compose up -d app
# =============================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: ipi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ipi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: registry.luanfernandes.dev/institutoipi/app:latest
    container_name: ipi-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_URL: ${PAYLOAD_PUBLIC_URL}
      NEXT_PUBLIC_PAYLOAD_URL: ${PAYLOAD_PUBLIC_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE}
      LEAD_NOTIFY_TO: ${LEAD_NOTIFY_TO}
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ipi-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.ipi-app.entrypoints=websecure"
      - "traefik.http.routers.ipi-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.ipi-app.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true

volumes:
  ipi_pgdata:
