name: Deploy (self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-selfhosted
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # O build acontece NO SERVIDOR (docker compose --build). O CI só dispara
      # o pull + rebuild por SSH. Repo é público → git pull anônimo no servidor.
      - name: Deploy por SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/institutoipi
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
