name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    uses: wizortech/deploy-workflows/.github/workflows/k8s-deploy.yml@main
    with:
      app_name: institutoipi
      image: institutoipi/app
      namespace: institutoipi
      # build_context = raiz (default) → ./Dockerfile (monolito Next.js + Payload)
      sops_env_file: k8s/secret.enc.env
    secrets: inherit
